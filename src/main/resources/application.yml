server:
  port: 8080
  # 1. ELIMINADOR DEL 403: 
  # Permite que Spring procese X-Forwarded-Proto y X-Forwarded-For.
  forward-headers-strategy: framework
  tomcat:
    accesslog:
      enabled: true
      directory: logs
      prefix: access
      suffix: .log
      file-date-format: .yyyy-MM-dd
      # method + path + status + bytes + tiempo (microsegundos) + UA + X-Forwarded-For
      pattern: '%h %l %u %t "%r" %s %b %D "%{User-Agent}i" "%{X-Forwarded-For}i"'

spring:
  datasource:
    # 2. CONEXIÓN DOCKER: 
    # Cambiado localhost -> postgres (ajusta si tu servicio se llama distinto)
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:trivia}
    username: ${DB_USER:trivia_user}
    password: ${DB_PASSWORD:supersecret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

# 3. DOCUMENTACIÓN API
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# 4. LOGGING OPTIMIZADO
# Solo errores y warnings críticos, sin spam de queries
logging:
  level:
    root: WARN
    levelup42.trivia: INFO
    com.zaxxer.hikari: WARN
    org.springframework.security: WARN
    org.springframework.boot.web: WARN
    org.springframework.web: INFO
    org.hibernate: WARN

application:
  security:
    google:
      # Client IDs permitidos para validar el idToken de Google.
      # Define GOOGLE_ALLOWED_AUDIENCES con una lista separada por comas.
      # Ejemplo: 123.apps.googleusercontent.com,456.apps.googleusercontent.com
      allowed-audiences: ${GOOGLE_ALLOWED_AUDIENCES:}