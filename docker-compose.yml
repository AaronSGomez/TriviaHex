services:
  postgres:
    image: postgres:16
    container_name: trivia_postgres
    restart: always
    environment:
      POSTGRES_DB: trivia
      POSTGRES_USER: trivia_user
      POSTGRES_PASSWORD: supersecret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: